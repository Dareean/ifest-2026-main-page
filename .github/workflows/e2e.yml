name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ifest_test
          POSTGRES_USER: ifest
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_pgsql, bcmath, gd, xml, curl, zip
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install PHP dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress

      - name: Configure backend environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=ifest_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=ifest/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=testpass/' .env
          echo "APP_ENV=local" >> .env
          echo "APP_KEY=" >> .env
          php artisan key:generate --force

      - name: Run database migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Start backend server
        working-directory: backend
        run: php artisan serve --host=0.0.0.0 --port=8000 &
        env:
          APP_ENV: local

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            curl -s http://127.0.0.1:8000 > /dev/null && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
