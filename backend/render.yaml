services:
  - type: web
    name: ifest-2026-api
    runtime: php
    repo: https://github.com/<username>/<repo>
    rootDir: backend
    region: singapore
    plan: free
    buildCommand: composer install --no-interaction --prefer-dist --optimize-autoloader
    startCommand: app:start
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://ifest-2026-main-page.onrender.com
      - key: FRONTEND_URL
        value: https://ifest-hmti-untad.vercel.app
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromEnv: SUPABASE_DB_HOST
      - key: DB_PORT
        value: "6543"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        fromEnv: SUPABASE_DB_USERNAME
      - key: DB_PASSWORD
        fromEnv: SUPABASE_DB_PASSWORD
      - key: DB_SSLMODE
        value: require
      - key: GOOGLE_CLIENT_ID
        fromEnv: GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
        fromEnv: GOOGLE_CLIENT_SECRET
      - key: GOOGLE_REDIRECT_URL
        value: https://ifest-2026-main-page.onrender.com/api/auth/google/callback
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: noreply@ifest2026.com
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: database
      - key: SANCTUM_STATEFUL_DOMAINS
        value: ifest-hmti-untad.vercel.app,localhost:5173,localhost:5174,localhost:5175,127.0.0.1:8000,localhost:8000
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
